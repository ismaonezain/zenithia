<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zenithia</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <h1>ZENITHIA</h1>
    <p>Loading...</p>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Mobile touch hint -->
  <div class="mobile-hint">Tap = move · 2 fingers = camera</div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div id="hud-name"></div>
    <div id="hud-level"></div>
    <!-- HP Bar -->
    <div id="hp-bar">
      <div id="hp-fill"></div>
      <span id="hp-text">--/--</span>
    </div>
    <!-- MP Bar -->
    <div id="mp-bar">
      <div id="mp-fill"></div>
      <span id="mp-text">--/--</span>
    </div>
    <!-- XP Bar -->
    <div id="xp-bar">
      <div id="xp-fill"></div>
      <span id="xp-text">XP 0/100</span>
    </div>
    <div id="hud-sp" style="display:none;">SP: 0</div>
    <!-- Target HP Bar -->
    <div id="target-hp-bar">
      <div id="target-hp-fill"></div>
      <span id="target-hp-text"></span>
    </div>
    <!-- Map Name Overlay -->
    <div id="map-name-overlay" style="display:none;">
      <div id="map-name-text"></div>
      <div id="map-name-sub"></div>
    </div>
    <!-- Mini Map -->
    <div id="mini-map"></div>
    <!-- Compass -->
    <div id="compass">
      <div id="compass-ring">
        <span class="dir dir-n">N</span>
        <span class="dir dir-e">E</span>
        <span class="dir dir-s">S</span>
        <span class="dir dir-w">W</span>
        <div id="compass-needle"></div>
      </div>
    </div>
    <!-- Time Display -->
    <div id="time-display"></div>
    <!-- Chat -->
    <div id="chat-box">
      <div id="chat-messages"></div>
      <input id="chat-input" type="text" placeholder="Type a message..." maxlength="200">
    </div>
  </div>

  <!-- Death Screen -->
  <div id="death-screen" style="display:none;">
    <div id="death-overlay"></div>
    <div id="death-panel">
      <h2>💀 You Died</h2>
      <p id="death-msg">Defeated in battle...</p>
      <div id="death-buttons">
        <button id="respawn-city" class="death-btn">🏠 Respawn at City</button>
        <button id="respawn-checkpoint" class="death-btn" style="display:none;">📍 Respawn at Checkpoint</button>
      </div>
    </div>
  </div>

  <!-- Loot Pickup UI -->
  <div id="loot-popup" style="display:none;">
    <div id="loot-header">📦 Loot Dropped!</div>
    <div id="loot-items"></div>
    <button id="loot-pickup-all">Pick Up All</button>
  </div>

  <!-- Skill Hotbar (10 slots, populated by JS) -->
  <div id="skill-hotbar" style="display:none;"></div>

  <!-- Skill Tree Button -->
  <button id="skill-tree-btn" style="display:none;">🌟 Skills</button>
  <button id="kiosk-btn" style="display:none;">🏪 Kios</button>
  <button id="dungeon-btn" style="display:none;">⚔️ Dungeon</button>

  <!-- Skill Tree Modal -->
  <div id="skill-tree-modal">
    <div id="skill-tree-panel">
      <div class="st-header">
        <span class="st-title">Skill Tree</span>
        <button class="st-close" onclick="document.getElementById('skill-tree-modal').classList.remove('show')">✕</button>
      </div>
      <div id="skill-tree-content"></div>
    </div>
  </div>

  <!-- Hotbar Right-Click Picker -->
  <div id="hotbar-picker" style="display:none;"></div>

  <!-- Skill Detail Panel -->
  <div id="skill-detail-panel" style="display:none;">
    <div id="skill-detail-icon" class="skill-detail-icon"></div>
    <div id="skill-detail-name" class="skill-detail-name"></div>
    <div id="skill-detail-class" class="skill-detail-class"></div>
    <div class="skill-detail-divider"></div>
    <div id="skill-detail-cost" class="skill-detail-stat"></div>
    <div id="skill-detail-cd" class="skill-detail-stat"></div>
    <div id="skill-detail-multi" class="skill-detail-stat"></div>
    <div id="skill-detail-range" class="skill-detail-stat"></div>
    <div class="skill-detail-divider"></div>
    <div id="skill-detail-desc" class="skill-detail-desc"></div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" style="display:none;">
    <h2>⚔️ Zenithia</h2>
    <p id="subtitle">Create Your Character</p>
    <div id="customize-layout">
      <!-- Left: Options -->
      <div id="customize-panel">
        <div class="row">
          <label>Name</label>
          <input id="name-input" type="text" placeholder="Enter your name" maxlength="20">
        </div>
        <div class="row">
          <label>Gender</label>
          <div id="gender-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Class</label>
          <div id="class-picker" class="picker"></div>
        </div>
        <!-- Class info card -->
        <div id="class-info" style="display:none;">
          <div id="class-info-icon"></div>
          <div id="class-info-body">
            <div id="class-info-title"></div>
            <div id="class-info-role"></div>
            <div id="class-info-desc"></div>
            <div id="class-info-stats"></div>
          </div>
        </div>
        <div class="row">
          <label>Skin</label>
          <div id="skin-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Hair</label>
          <div id="hair-color-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Style</label>
          <div id="hair-style-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Top</label>
          <div id="top-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Bottom</label>
          <div id="bottom-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Eyes</label>
          <div id="eye-picker" class="picker"></div>
        </div>
      </div>
      <!-- Right: Preview -->
      <div id="char-preview">
        <canvas id="preview-canvas" width="220" height="300"></canvas>
        <div id="class-badge"></div>
      </div>
    </div>
    <div id="login-actions">
      <button id="connect-wallet">🔗 Connect Wallet</button>
      <!-- CAPTCHA + SIGN (shown after wallet connect) -->
      <div id="captcha-section" style="display:none;">
        <div class="row">
          <label id="captcha-question"></label>
          <input id="captcha-input" type="text" placeholder="Your answer" maxlength="10">
        </div>
        <button id="sign-wallet">Sign & Login</button>
        <p id="captcha-status" style="color:#ccc;font-size:12px;"></p>
      </div>
      <button id="start-game">⚔️ Enter World</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="/js/sfx.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
