<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zenithia</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <h1>ZENITHIA</h1>
    <p>Loading...</p>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Mobile touch hint -->
  <div class="mobile-hint">Tap = move · 2 fingers = camera</div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <!-- HP Bar -->
    <div id="hp-bar">
      <div id="hp-fill"></div>
      <span id="hp-text">100/100</span>
    </div>
    <!-- MP Bar -->
    <div id="mp-bar">
      <div id="mp-fill"></div>
      <span id="mp-text">50/50</span>
    </div>
    <!-- XP Bar -->
    <div id="xp-bar">
      <div id="xp-fill"></div>
      <span id="xp-text">Lv.1</span>
    </div>
    <!-- Map Name Overlay -->
    <div id="map-name-overlay" style="display:none;">
      <div id="map-name-text"></div>
      <div id="map-name-sub"></div>
    </div>
    <!-- Mini Map -->
    <div id="mini-map"></div>
    <!-- Compass -->
    <div id="compass">
      <div id="compass-ring">
        <span class="dir dir-n">N</span>
        <span class="dir dir-e">E</span>
        <span class="dir dir-s">S</span>
        <span class="dir dir-w">W</span>
        <div id="compass-needle"></div>
      </div>
    </div>
    <!-- Time Display -->
    <div id="time-display"></div>
    <!-- Chat -->
    <div id="chat-box">
      <div id="chat-messages"></div>
      <input id="chat-input" type="text" placeholder="Type a message..." maxlength="200">
    </div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" style="display:none;">
    <h2>⚔️ Zenithia</h2>
    <p id="subtitle">Create Your Character</p>
    <div id="customize-layout">
      <!-- Left: Options -->
      <div id="customize-panel">
        <div class="row">
          <label>Name</label>
          <input id="name-input" type="text" placeholder="Enter your name" maxlength="20">
        </div>
        <div class="row">
          <label>Gender</label>
          <div id="gender-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Class</label>
          <div id="class-picker" class="picker"></div>
        </div>
        <!-- Class info card -->
        <div id="class-info" style="display:none;">
          <div id="class-info-icon"></div>
          <div id="class-info-body">
            <div id="class-info-title"></div>
            <div id="class-info-role"></div>
            <div id="class-info-desc"></div>
            <div id="class-info-stats"></div>
          </div>
        </div>
        <div class="row">
          <label>Skin</label>
          <div id="skin-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Hair</label>
          <div id="hair-color-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Style</label>
          <div id="hair-style-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Top</label>
          <div id="top-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Bottom</label>
          <div id="bottom-picker" class="picker"></div>
        </div>
        <div class="row">
          <label>Eyes</label>
          <div id="eye-picker" class="picker"></div>
        </div>
      </div>
      <!-- Right: Preview -->
      <div id="char-preview">
        <canvas id="preview-canvas" width="220" height="300"></canvas>
        <div id="class-badge"></div>
      </div>
    </div>
    <div id="login-actions">
      <button id="connect-wallet">🔗 Connect Wallet</button>
      <!-- CAPTCHA + SIGN (shown after wallet connect) -->
      <div id="captcha-section" style="display:none;">
        <div class="row">
          <label id="captcha-question"></label>
          <input id="captcha-input" type="text" placeholder="Your answer" maxlength="10">
        </div>
        <button id="sign-wallet">Sign & Login</button>
        <p id="captcha-status" style="color:#ccc;font-size:12px;"></p>
      </div>
      <button id="start-game">⚔️ Enter World</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
